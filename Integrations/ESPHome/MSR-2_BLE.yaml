esphome:
  name: "${name}"
  friendly_name: Apollo MSR-2
  comment: Apollo MSR-2
  name_add_mac_suffix: true
  on_boot:
  - priority: 900.0
    then:
      - lambda: |-
          id(radar_bluetooth).turn_off();
  - priority: 500
    then:
      - text_sensor.template.publish:
          id: apollo_firmware_version
          state: "${version}"
  - priority: -10
    then:
      - if:
          condition:
            - lambda: "return id(runTest);"
          then:
            - lambda: "id(testScript).execute();"

  project:
    name: "ApolloAutomation.MSR-2_BLE"
    version: "${version}"

  min_version: 2025.11.0

logger:
  
dashboard_import:
  package_import_url: github://ApolloAutomation/MSR-2/Integrations/ESPHome/MSR-2_BLE.yaml
  import_full_config: false

wifi:
  on_connect:
    - component.update: update_http_request
  ap:
    ssid: "Apollo MSR2 Hotspot"

ota:
  - platform: esphome
    id: ota_esphome
  - platform: http_request
    id: ota_managed

bluetooth_proxy:
  active: true
esp32_ble_tracker:
  scan_parameters:
    active: false

http_request:
  verify_ssl: true

safe_mode:

update:
  - platform: http_request
    id: update_http_request
    name: Firmware Update
    source: https://apolloautomation.github.io/MSR-2/firmware-ble/manifest.json

packages:
  core: !include Core.yaml
