esphome:
  name: "${name}"
  friendly_name: Apollo MSR-2
  comment: Apollo MSR-2
  name_add_mac_suffix: true
  on_boot:
  - priority: 900.0
    then:
      - lambda: |-
          id(radar_bluetooth).turn_off();
  - priority: 500
    then:
      - text_sensor.template.publish:
          id: apollo_firmware_version
          state: "${version}"
  - priority: -10
    then:
      - if:
          condition:
            - lambda: "return id(runTest);"
          then:
            - lambda: "id(testScript).execute();"

  project:
    name: "ApolloAutomation.MSR-2_Factory"
    version: "${version}"

  min_version: 2025.2.0

  
dashboard_import:
  package_import_url: github://ApolloAutomation/MSR-2/Integrations/ESPHome/MSR-2_Factory.yaml
  import_full_config: false


improv_serial:

esp32_improv:
  authorizer: none

wifi:
  ap:
    ssid: "Apollo MSR2 Hotspot"

logger:

ota:
  - platform: esphome
    id: ota_esphome
  - platform: http_request
    id: ota_managed

http_request:
  verify_ssl: true

safe_mode:

update:
  - platform: http_request
    id: update_http_request
    name: Firmware Update
    source: https://apolloautomation.github.io/MSR-2/firmware/manifest.json

packages:
  core: !include Core.yaml
