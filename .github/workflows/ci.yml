name: CI

on:
  pull_request:

permissions:
  contents: read

# Label check lives in label-check.yml on pull_request_target so it can
# label fork-submitted PRs; plain pull_request tokens are read-only there.
jobs:
  ci:
    name: CI
    uses: ApolloAutomation/Workflows/.github/workflows/esphome-ci.yml@430d90dc695c6f7d1075c4e4a0df4b13a6496252 # main 2026-07-23
    with:
      yaml-files: |
        Integrations/ESPHome/MSR-2_Factory.yaml
        Integrations/ESPHome/MSR-2.yaml
        Integrations/ESPHome/MSR-2_BLE.yaml

